<h2 mat-dialog-title>{{tituloAccion}} Usuario</h2>

<mat-dialog-content>
    <form [formGroup]="formularioUsuario">
        <mat-grid-list cols="1" rowHeight="80px">
            <mat-grid-tile>
                <mat-form-field appearance="fill">
                    <mat-label>Nombre Completo</mat-label>
                    <input matInput autocomplete="off" formControlName="nombreCompleto">
                    <mat-icon matSuffix>account-box</mat-icon>
                </mat-form-field>
            </mat-grid-tile>

            <mat-grid-tile>
                <mat-form-field appearance="fill">
                    <mat-label>Correo</mat-label>
                    <input matInput autocomplete="off" formControlName="correo">
                    <mat-icon matSuffix>mail</mat-icon>
                </mat-form-field>
            </mat-grid-tile>

            <mat-grid-tile>
                <mat-form-field appearance="fill">
                    <mat-label>Rol</mat-label>
                    <mat-select formControlName="idRol">
                        <mat-option *ngFor="let item of listaRoles" [value]="item.idRol">
                            {{item.nombre}}
                        </mat-option>

                    </mat-select>

                    
                    
                </mat-form-field>
            </mat-grid-tile>

            <mat-grid-tile>
                <mat-form-field appearance="fill">
                    <mat-label>Contraseña</mat-label>
                    <input [type]="ocultarPassword ? 'password': 'text'" matInput formControlName="clave">
                    <button mat-icon-button matSuffix (click)="ocultarPassword=!ocultarPassword" type="button">
                      <mat-icon matSuffix>{{ocultarPassword?'visibility_off':'visibility'}}</mat-icon>
                    </button>                    
                  </mat-form-field>
                  
            </mat-grid-tile>

            <mat-grid-tile>
                <mat-form-field appearance="fill">
                    <mat-label>Estado</mat-label>
                    <mat-select formControlName="esActivo">
                        <mat-option value="1">Activo</mat-option>
                        <mat-option value="0">No activo</mat-option>
                    </mat-select>
                </mat-form-field>
            </mat-grid-tile>

            <mat-grid-tile>
                <div style="display:flex;flex-direction:column;align-items:center;gap:8px;width:100%">
                    <div *ngIf="previewUrl" style="width:120px;height:120px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:50%;">
                        <img [src]="previewUrl" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:50%;">
                    </div>
                    <button mat-raised-button color="accent" type="button" (click)="fileInput.click()">
                        <mat-icon>upload</mat-icon> {{previewUrl?'Cambiar':'Subir'}} Foto
                    </button>
                    <input #fileInput type="file" accept="image/jpeg,image/png,image/gif,image.webp" style="display:none" (change)="onFileSelected($event)">
                </div>
            </mat-grid-tile>
        </mat-grid-list>
    </form>

</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-raised-button mat-dialog-close color="warn">Volver</button>
    <button mat-raised-button color="primary" [disabled]="formularioUsuario.invalid" (click)="guardarEditar_Usuario()">{{botonAccion}}</button>

</mat-dialog-actions>
